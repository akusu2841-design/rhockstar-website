<!DOCTYPE html>
<html>
<head>
<title>Rhockstar Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:Arial;
}

.sidebar{
    width:220px;
    height:100vh;
    background:#111;
    position:fixed;
    padding-top:20px;
}

.sidebar h2{
    text-align:center;
    color:#00ffcc;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#1a1a1a;
}

.main{
    margin-left:220px;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1a1a1a;
    padding:20px;
    border-radius:10px;
}

.logout{
    background:red;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Rhockstar</h2>

    <a href="#">Dashboard</a>
    <a href="#">Orders</a>
    <a href="#">Payments</a>
    <a href="#">Users</a>

    <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<h1>Admin Dashboard 🚀</h1>

<div class="cards">

<div class="card">
    <h2>Total Orders</h2>
    <p>25</p>
</div>

<div class="card">
    <h2>Total Users</h2>
    <p>10</p>
</div>

<div class="card">
    <h2>Revenue</h2>
    <p>₦250,000</p>
</div>

</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyApIqqO8AfmyA3N6JofFGxEjfcxKo6nXXc",
  authDomain: "rhockstar-admin.firebaseapp.com",
  projectId: "rhockstar-admin",
  storageBucket: "rhockstar-admin.firebasestorage.app",
  messagingSenderId: "66440765531",
  appId: "1:66440765531:web:9b0d3fd8b110defac29f7e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function logout(){
    auth.signOut().then(() => {
        alert("Logged out");
        window.location.href = "login.html";
    });
}
</script>

</body>
</html>
