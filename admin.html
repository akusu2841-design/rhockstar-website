<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0a0a;
    color:white;
}

.sidebar{
    width:220px;
    height:100vh;
    background:#111;
    position:fixed;
    padding-top:20px;
}

.sidebar h2{
    text-align:center;
    color:#00ffcc;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#1a1a1a;
}

.main{
    margin-left:220px;
    padding:20px;
}

.card{
    background:#1a1a1a;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Rhockstar</h2>
    <a href="#">Dashboard</a>
    <a href="#">Orders</a>
    <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<h1>Live Orders 🚀</h1>

<div id="orders"></div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyApIqqO8AfmyA3N6JofFGxEjfcxKo6nXXc",
  authDomain: "rhockstar-admin.firebaseapp.com",
  projectId: "rhockstar-admin",
  storageBucket: "rhockstar-admin.firebasestorage.app",
  messagingSenderId: "66440765531",
  appId: "1:66440765531:web:9b0d3fd8b110defac29f7e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// LOGOUT
function logout(){
    auth.signOut().then(() => {
        window.location.href = "login.html";
    });
}

// REAL-TIME ORDERS
db.collection("orders")
.orderBy("time", "desc")
.onSnapshot(snapshot => {

    let html = "";

    snapshot.forEach(doc => {
        let o = doc.data();

        html += `
        <div class="card">
            <h3>${o.name}</h3>
            <p>${o.phone}</p>
            <p>${o.service}</p>
            <p>${o.description}</p>
        </div>
        `;
    });

    document.getElementById("orders").innerHTML = html;

});

</script>

</body>
</html>
