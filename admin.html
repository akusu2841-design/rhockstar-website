<!DOCTYPE html>
<html>
<head>
<title>Rhockstar Admin Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0a0a;
    color:white;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:100vh;
    background:#111;
    position:fixed;
    padding-top:20px;
}

.sidebar h2{
    text-align:center;
    color:#00ffcc;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#1a1a1a;
}

/* Main */
.main{
    margin-left:220px;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:#1a1a1a;
    padding:20px;
    border-radius:10px;
}

button{
    background:red;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Rhockstar</h2>

    <a href="#">Dashboard</a>
    <a href="#">Orders</a>
    <a href="#">Users</a>
    <a href="#">Payments</a>

    <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>Welcome Admin 🚀</h1>
<p>This is your SaaS dashboard control panel.</p>

<div class="cards">
    <div class="card">
        <h3>Total Orders</h3>
        <p>0</p>
    </div>

    <div class="card">
        <h3>Total Users</h3>
        <p>0</p>
    </div>

    <div class="card">
        <h3>Revenue</h3>
        <p>₦0</p>
    </div>
</div>

<button onclick="testDB()">Test Database</button>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyApIqqO8AfmyA3N6JofFGxEjfcxKo6nXXc",
  authDomain: "rhockstar-admin.firebaseapp.com",
  projectId: "rhockstar-admin",
  storageBucket: "rhockstar-admin.firebasestorage.app",
  messagingSenderId: "66440765531",
  appId: "1:66440765531:web:9b0d3fd8b110defac29f7e"
};

// INIT
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// 🔴 LOGOUT FUNCTION
function logout(){
    auth.signOut().then(() => {
        alert("Logged out");
        window.location.href = "login.html";
    });
}

// 🧪 TEST DATABASE
function testDB(){

    db.collection("orders").add({
        name: "Test Client",
        service: "Design",
        amount: 15000,
        time: new Date()
    })

    .then(() => {
        alert("Database working 🚀");
    })

    .catch((error) => {
        alert(error.message);
    });

}
</script>

</body>
</html>
