<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rhockstar Nation SaaS</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}

body{
background:linear-gradient(135deg,#0b0b0b,#141414);
color:white;
min-height:100vh;
}

/* NAV */
.nav{
display:flex;
gap:10px;
padding:10px;
background:#111;
position:sticky;
top:0;
z-index:10;
}

.nav button{
padding:10px;
border:none;
background:#222;
color:white;
border-radius:8px;
cursor:pointer;
}

.nav button:hover{
background:#00ffcc;
color:#000;
}

/* PAGE */
.page{display:none;padding:20px}
.active{display:block;animation:fade .25s ease}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:15px;
margin:10px 0;
border-radius:12px;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:scale(1.02);
background:rgba(0,255,204,0.08);
}

/* INPUTS */
input,select,textarea{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
background:#222;
color:white;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00ffcc;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#00ddb3}

h2{margin-bottom:10px}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('services')">Services</button>
<button onclick="show('orders')">Orders</button>
<button onclick="show('admin')">Admin</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
<h2>Rhockstar Nation 🚀</h2>
<p>Creative SaaS platform for digital services.</p>
</div>

<!-- SERVICES -->
<div id="services" class="page">
<h2>Services</h2>

<div class="card" onclick="selectService('Advert Placement')">📢 Advert Placement</div>
<div class="card" onclick="selectService('Certificate Editing')">📜 Certificate Editing</div>
<div class="card" onclick="selectService('Document Editing')">📄 Document Editing</div>
<div class="card" onclick="selectService('Graphics Design')">🎨 Graphics Design</div>
<div class="card" onclick="selectService('Logo Design')">🧠 Logo Design</div>
<div class="card" onclick="selectService('Web Design')">🌐 Web Design</div>
<div class="card" onclick="selectService('Web Development')">💻 Web Development</div>

</div>

<!-- ORDER -->
<div id="orders" class="page">
<h2>Place Order (Payment Required)</h2>

<input id="name" placeholder="Your Name" />
<input id="phone" placeholder="Phone Number" />

<select id="service">
<option>Advert Placement</option>
<option>Certificate Editing</option>
<option>Document Editing</option>
<option>Graphics Design</option>
<option>Logo Design</option>
<option>Web Design</option>
<option>Web Development</option>
</select>

<textarea id="desc" placeholder="Describe your project"></textarea>

<button onclick="pay()">Pay & Submit Order</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2>Admin Panel</h2>

<input id="adminPass" type="password" placeholder="Admin Password"/>
<button onclick="loginAdmin()">Login</button>

<div id="adminBox" style="display:none;">
<h3>All Orders</h3>
<div id="ordersList"></div>
</div>

</div>

<script>

/* NAV */
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* SERVICE SELECT */
function selectService(service){
document.getElementById("service").value = service;
show('orders');
}

/* ORDERS DB */
let orders = JSON.parse(localStorage.getItem("orders") || "[]");

/* SAVE ORDER */
function saveOrder(reference){
orders.push({
name:name.value,
phone:phone.value,
service:service.value,
desc:desc.value,
status:"Paid",
ref:reference
});

localStorage.setItem("orders", JSON.stringify(orders));

alert("Payment successful & order saved 🚀");
show('admin');
loadOrders();
}

/* LOAD ORDERS */
function loadOrders(){
ordersList.innerHTML = "";

orders.forEach(o=>{
ordersList.innerHTML += `
<div class="card">
<b>${o.name}</b><br>
${o.service}<br>
${o.phone}<br>
Status: ${o.status}<br>
Ref: ${o.ref}
</div>`;
});
}

/* ADMIN LOGIN */
function loginAdmin(){
if(adminPass.value === "1234"){
adminBox.style.display = "block";
loadOrders();
}else{
alert("Wrong password");
}
}

/* PAYSTACK (FINAL LOCK SYSTEM) */
function pay(){

if(!name.value || !phone.value || !desc.value){
alert("Fill all fields before payment");
return;
}

let handler = PaystackPop.setup({
key:"pk_test_f9c8ed728fac1059de000e81d0a57ce44e59d8d0",
email:prompt("Enter email for receipt"),
amount:5000 * 100,
currency:"NGN",

callback:function(res){
saveOrder(res.reference);
},

onClose:function(){
alert("Payment cancelled");
}
});

handler.openIframe();
}

</script>

</body>
</html>
