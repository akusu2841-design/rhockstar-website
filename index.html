<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhockstar Nation SaaS</title>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* ANIMATED BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:linear-gradient(-45deg,#0b0b0b,#111,#1a1a1a,#000);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
z-index:-2;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* OVERLAY FOR READABILITY */
.page{
display:none;
padding:20px;
min-height:100vh;
position:relative;
}

.page::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:0;
}

.page > *{
position:relative;
z-index:1;
}

.active{display:block}

/* NAV */
nav{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
padding:10px;
border-radius:40px;
display:flex;
gap:10px;
z-index:999;
}

nav button{
padding:10px 15px;
border:none;
border-radius:20px;
background:#222;
color:#fff;
cursor:pointer;
}

nav button:hover{
background:#00ffcc;
color:#000;
}

/* CARDS */
.card{
background:rgba(255,255,255,0.08);
padding:15px;
margin:10px 0;
border-radius:12px;
backdrop-filter:blur(10px);
}

/* INPUTS */
input,textarea,select{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#222;
color:#fff;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:10px;
background:#00ffcc;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{opacity:0.8}

/* WHATSAPP */
.wa{
position:fixed;
bottom:90px;
right:20px;
background:#25D366;
color:#fff;
padding:15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
z-index:999;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('services')">Services</button>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('admin')">Admin</button>
</nav>

<!-- HOME -->
<div id="home" class="page active"
style="background:url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') center/cover;">

<h1>Rhockstar Nation</h1>

<div class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

</div>

<!-- SERVICES -->
<div id="services" class="page"
style="background:url('https://images.unsplash.com/photo-1557683316-973673baf926') center/cover;">

<h2>Services</h2>

<div class="card">
<h3>📢 Advert Placement</h3>
<p>
24H - ₦5,000<br>
3 Days - ₦12,000<br>
1 Week - ₦25,000<br>
1 Month - ₦90,000
</p>

<button onclick="selectService('Advert - 24H',5000)">24H</button>
<button onclick="selectService('Advert - 3 Days',12000)">3 Days</button>
<button onclick="selectService('Advert - 1 Week',25000)">1 Week</button>
<button onclick="selectService('Advert - 1 Month',90000)">1 Month</button>
</div>

<div class="card" onclick="selectService('Graphics Design',15000)">Graphics Design ₦15,000</div>
<div class="card" onclick="selectService('Logo Design',10000)">Logo Design ₦10,000</div>

<!-- UPDATED WEB DEVELOPMENT PRICE -->
<div class="card" onclick="selectService('Web Development (150k - 500k+)',150000)">
💻 Web Development ₦150,000 – ₦500,000+
</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page"
style="background:url('https://images.unsplash.com/photo-1556741533-f6acd647d2fb') center/cover;">

<h2>User Dashboard</h2>

<div class="card">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<input id="serviceInput" placeholder="Service" readonly>
<input id="priceInput" placeholder="Price" readonly>

<textarea id="desc" placeholder="Project details"></textarea>

<button onclick="pay()">Pay & Create Order</button>
</div>

<div class="card">
<h3>My Orders</h3>
<div id="myOrders"></div>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="page"
style="background:url('https://images.unsplash.com/photo-1551434678-e076c223a692') center/cover;">

<h2>Admin Panel</h2>
<div id="allOrders"></div>

</div>

<!-- WHATSAPP -->
<a class="wa" href="https://wa.me/2348074647269" target="_blank">
💬 WhatsApp
</a>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCKdJaHy_FUSFbnUkTCm3p7p32sM1E5r7w",
authDomain: "rhockstar-nation.firebaseapp.com",
projectId: "rhockstar-nation",
storageBucket: "rhockstar-nation.appspot.com",
messagingSenderId: "707658422879",
appId: "1:707658422879:web:aad99a01a882bb21a999ea"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let selectedPrice = 0;

/* NAV */
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* AUTH */
function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

/* SELECT */
function selectService(service,price){
serviceInput.value = service;
priceInput.value = price;
selectedPrice = price;
show('dashboard');
}

/* PAY */
function pay(){

if(!auth.currentUser){
alert("Login first");
return;
}

let handler = PaystackPop.setup({
key:"pk_test_f9c8ed728fac1059de000e81d0a57ce44e59d8d0",
email:auth.currentUser.email,
amount:selectedPrice*100,
currency:"NGN",

callback:function(res){

db.collection("orders").add({
userId:auth.currentUser.uid,
name:name.value,
phone:phone.value,
service:serviceInput.value,
price:selectedPrice,
desc:desc.value,
status:"Pending",
reference:res.reference,
time:new Date()
});

loadMyOrders();
loadAllOrders();

alert("Order successful 🚀");

}
});

handler.openIframe();
}

/* MY ORDERS */
function loadMyOrders(){

if(!auth.currentUser) return;

db.collection("orders")
.where("userId","==",auth.currentUser.uid)
.onSnapshot(snap=>{

myOrders.innerHTML="";

snap.forEach(d=>{
let o=d.data();

myOrders.innerHTML+=`
<div class="card">
<b>${o.service}</b><br>
₦${o.price}<br>
Status: ${o.status}
</div>`;
});
});
}

/* ADMIN */
function loadAllOrders(){

db.collection("orders")
.onSnapshot(snap=>{

allOrders.innerHTML="";

snap.forEach(d=>{
let o=d.data();

allOrders.innerHTML+=`
<div class="card">
<b>${o.name}</b><br>
${o.service}<br>
₦${o.price}<br>
Status: ${o.status}
</div>`;
});
});
}

auth.onAuthStateChanged(user=>{
if(user){
loadMyOrders();
loadAllOrders();
}
});

</script>

</body>
</html>
