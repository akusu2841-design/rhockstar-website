<!DOCTYPE html>
<html>
<head>
<title>Test Page</title>

<style>
.page{display:none}
.active{display:block}
.card{
padding:20px;
margin:10px;
background:#222;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card" onclick="show('services')">
Click Me → Go to Services
</div>

<div id="home" class="page active">
<h1>HOME PAGE</h1>
</div>

<div id="services" class="page">
<h1>SERVICES PAGE</h1>

<div class="card" onclick="alert('Service clicked working')">
Click Service
</div>

</div>

<script>
function show(id){
document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active');
});
document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
