<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhockstar Nation - Fiverr Clone SaaS</title>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

nav{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:10px;
border-radius:40px;
display:flex;
gap:10px;
z-index:999;
}

nav button{
padding:10px 15px;
border:none;
border-radius:20px;
background:#222;
color:#fff;
cursor:pointer;
}

nav button:hover{
background:#00ffcc;
color:#000;
}

.page{display:none;padding:20px;min-height:100vh}
.active{display:block}

.card{
background:#1a1a1a;
padding:15px;
margin:10px 0;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#222;
color:#fff;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00ffcc;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{opacity:0.8}

.small{
font-size:12px;
opacity:0.7;
}
</style>
</head>

<body>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('services')">Services</button>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('admin')">Admin</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<h1>Rhockstar Nation SaaS</h1>

<div class="card">
<h3>Auth</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>
</div>

<!-- SERVICES -->
<div id="services" class="page">

<h2>Services</h2>

<div class="card" onclick="selectService('Graphics Design',15000)">Graphics Design ₦15,000</div>
<div class="card" onclick="selectService('Logo Design',10000)">Logo Design ₦10,000</div>
<div class="card" onclick="selectService('Certificate Editing',40000)">Certificate Editing ₦40,000</div>
<div class="card" onclick="selectService('Web Design',120000)">Web Design ₦120,000</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">

<h2>User Dashboard</h2>

<div class="card">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="service" placeholder="Service" readonly>
<input id="price" placeholder="Price" readonly>
<textarea id="desc" placeholder="Details"></textarea>

<button onclick="pay()">Pay & Create Order</button>
</div>

<h3>My Orders</h3>
<div id="myOrders"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="page">

<h2>Admin Panel</h2>
<div id="allOrders"></div>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCKdJaHy_FUSFbnUkTCm3p7p32sM1E5r7w",
authDomain: "rhockstar-nation.firebaseapp.com",
projectId: "rhockstar-nation",
storageBucket: "rhockstar-nation.appspot.com",
messagingSenderId: "707658422879",
appId: "1:707658422879:web:aad99a01a882bb21a999ea"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let selectedPrice = 0;

/* NAV */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* AUTH */
function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>alert("Registered"))
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>alert("Logged in"))
.catch(e=>alert(e.message));
}

/* SERVICE SELECT */
function selectService(service,price){
serviceInput.value = service;
priceInput.value = price;
selectedPrice = price;
show('dashboard');
}

/* PAYSTACK */
function pay(){

if(!auth.currentUser){
alert("Login first");
return;
}

let handler = PaystackPop.setup({
key:"pk_test_f9c8ed728fac1059de000e81d0a57ce44e59d8d0",
email:auth.currentUser.email,
amount:selectedPrice*100,
currency:"NGN",

callback:function(res){

db.collection("orders").add({
userId:auth.currentUser.uid,
name:name.value,
phone:phone.value,
service:serviceInput.value,
price:selectedPrice,
desc:desc.value,
status:"Pending",
reference:res.reference,
time:new Date()
});

loadMyOrders();
loadAllOrders();
alert("Order created");
}
});

handler.openIframe();
}

/* USER ORDERS */
function loadMyOrders(){

if(!auth.currentUser) return;

db.collection("orders")
.where("userId","==",auth.currentUser.uid)
.onSnapshot(snap=>{

myOrders.innerHTML="";

snap.forEach(d=>{
let o=d.data();

myOrders.innerHTML+=`
<div class="card">
<b>${o.service}</b><br>
₦${o.price}<br>
Status: ${o.status}<br>
<small>${o.reference}</small>
</div>`;
});
});
}

/* ADMIN PANEL */
function loadAllOrders(){

db.collection("orders")
.onSnapshot(snap=>{

allOrders.innerHTML="";

snap.forEach(d=>{
let o=d.data();

allOrders.innerHTML+=`
<div class="card">
<b>${o.name}</b><br>
${o.service}<br>
₦${o.price}<br>
Status: ${o.status}<br>

<button onclick="updateStatus('${d.id}','In Progress')">Start</button>
<button onclick="updateStatus('${d.id}','Completed')">Complete</button>

</div>`;
});
});
}

/* UPDATE STATUS */
function updateStatus(id,status){
db.collection("orders").doc(id).update({
status:status
});
}

/* INIT */
auth.onAuthStateChanged(user=>{
if(user){
loadMyOrders();
loadAllOrders();
}
});

</script>

</body>
</html>
