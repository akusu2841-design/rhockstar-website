<!DOCTYPE html>
<html>
<head>
  <title>Rhockstar Nation</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0a0a0a;
      color: white;
    }

    .nav {
      background: #111;
      padding: 15px;
      display: flex;
      gap: 10px;
    }

    .nav button {
      background: #222;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
    }

    .nav button:hover {
      background: #00ffcc;
      color: black;
    }

    .page {
      display: none;
      padding: 30px;
    }

    #home {
      display: block;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    .submit {
      background: #00ffcc;
      border: none;
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      cursor: pointer;
      border-radius: 8px;
    }

    .submit:hover {
      background: #00c9a7;
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<div class="nav">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('orders')">Orders</button>
  <button onclick="showPage('admin')">Admin</button>
  <button onclick="showPage('login')">Login</button>
</div>

<!-- HOME -->
<div id="home" class="page">
  <h1>Welcome to Rhockstar Nation 🚀</h1>
</div>

<!-- ORDERS -->
<div id="orders" class="page">
  <h2>Place Order</h2>

  <div class="card">
    <form id="orderForm">
      <input id="name" placeholder="Name" required>
      <input id="phone" placeholder="Phone" required>

      <select id="service">
        <option value="Graphic Design|15000">Graphic Design - ₦15,000</option>
        <option value="Video Editing|60000">Video Editing - ₦60,000</option>
        <option value="Document Design|30000">Document Design - ₦30,000</option>
      </select>

      <textarea id="desc" placeholder="Description"></textarea>

      <button class="submit" type="submit">Submit Order</button>
    </form>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2>Admin Panel</h2>
  <p>Welcome Admin 🚀</p>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h2>Login</h2>

  <div class="card">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="submit" onclick="login()">Login</button>
  </div>
</div>

<script>
  // FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyApIqqO8AfmyA3N6JofFGxEjfcxKo6nXXc",
    authDomain: "rhockstar-admin.firebaseapp.com",
    projectId: "rhockstar-admin",
    storageBucket: "rhockstar-admin.firebasestorage.app",
    messagingSenderId: "66440765531",
    appId: "1:66440765531:web:9b0d3fd8b110defac29f7e"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  // PAGE SWITCH
  function showPage(pageId) {
    let pages = document.querySelectorAll(".page");
    pages.forEach(p => p.style.display = "none");
    document.getElementById(pageId).style.display = "block";
  }

  // LOGIN
  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        alert("Login successful 🚀");
        showPage("admin");
      })
      .catch(err => alert(err.message));
  }

  // AUTO CHECK LOGIN
  auth.onAuthStateChanged(user => {
    if (user) {
      showPage("admin");
    } else {
      showPage("home");
    }
  });

  // ORDER SUBMIT
  document.getElementById("orderForm").addEventListener("submit", function(e) {
    e.preventDefault();

    db.collection("orders").add({
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      service: document.getElementById("service").value,
      description: document.getElementById("desc").value,
      time: new Date()
    })
    .then(() => {
      alert("Order submitted 🚀");
      document.getElementById("orderForm").reset();
    });
  });
</script>

</body>
</html>
