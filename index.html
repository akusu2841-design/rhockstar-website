<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhockstar Nation SaaS</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}

body{
background:linear-gradient(135deg,#0b0b0b,#141414);
color:#fff;
min-height:100vh;
}

.nav{
display:flex;
gap:10px;
padding:10px;
background:#111;
position:sticky;
top:0;
}

.nav button{
padding:10px;
border:none;
background:#222;
color:#fff;
border-radius:8px;
cursor:pointer;
}

.nav button:hover{background:#00ffcc;color:#000}

.page{display:none;padding:20px}
.active{display:block}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
margin:10px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
}

input,select,textarea{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
background:#222;
color:#fff;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00ffcc;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#00ddb3}

h2{margin-bottom:10px}
</style>
</head>

<body>

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('services')">Services</button>
<button onclick="show('orders')">Orders</button>
<button onclick="show('admin')">Admin</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
<h2>Rhockstar Nation 🚀</h2>
<p>Creative SaaS platform for services</p>
</div>

<!-- SERVICES -->
<div id="services" class="page">
<h2>Services</h2>

<div class="card" onclick="selectService('Advert Placement')">📢 Advert Placement</div>
<div class="card" onclick="selectService('Certificate Editing')">📜 Certificate Editing</div>
<div class="card" onclick="selectService('Document Editing')">📄 Document Editing</div>
<div class="card" onclick="selectService('Graphics Design')">🎨 Graphics Design</div>
<div class="card" onclick="selectService('Logo Design')">🧠 Logo Design</div>
<div class="card" onclick="selectService('Web Design')">🌐 Web Design</div>
<div class="card" onclick="selectService('Web Development')">💻 Web Development</div>

</div>

<!-- ORDERS -->
<div id="orders" class="page">
<h2>Place Order</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<select id="service">
<option>Advert Placement</option>
<option>Certificate Editing</option>
<option>Document Editing</option>
<option>Graphics Design</option>
<option>Logo Design</option>
<option>Web Design</option>
<option>Web Development</option>
</select>

<textarea id="desc" placeholder="Describe your project"></textarea>

<button onclick="pay()">Pay & Submit Order</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2>Admin Panel</h2>

<input id="adminPass" type="password" placeholder="Enter Admin Password">
<button onclick="loginAdmin()">Login</button>

<div id="adminBox" style="display:none;">
<h3>All Orders</h3>
<div id="ordersList"></div>
</div>

</div>

<script>

/* NAV */
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* SERVICE */
function selectService(service){
document.getElementById("service").value = service;
show('orders');
}

/* STORAGE */
let orders = JSON.parse(localStorage.getItem("orders") || "[]");

/* PAYSTACK */
function pay(){

const nameVal = document.getElementById("name").value.trim();
const phoneVal = document.getElementById("phone").value.trim();
const descVal = document.getElementById("desc").value.trim();
const serviceVal = document.getElementById("service").value;

if(!nameVal || !phoneVal || !descVal){
alert("Fill all fields before payment");
return;
}

let handler = PaystackPop.setup({
key:"pk_test_f9c8ed728fac1059de000e81d0a57ce44e59d8d0",
email:prompt("Enter email for receipt"),
amount:5000 * 100,
currency:"NGN",

callback:function(res){
saveOrder(nameVal, phoneVal, serviceVal, descVal, res.reference);
},

onClose:function(){
alert("Payment cancelled");
}
});

handler.openIframe();
}

/* SAVE ORDER */
function saveOrder(name, phone, service, desc, ref){

orders.push({
name, phone, service, desc,
ref,
status:"Paid"
});

localStorage.setItem("orders", JSON.stringify(orders));

alert("Order saved successfully 🚀");
show('admin');
loadOrders();
}

/* LOAD ORDERS */
function loadOrders(){
const box = document.getElementById("ordersList");
box.innerHTML = "";

orders.forEach(o=>{
box.innerHTML += `
<div class="card">
<b>${o.name}</b><br>
${o.service}<br>
${o.phone}<br>
Status: ${o.status}<br>
Ref: ${o.ref}
</div>`;
});
}

/* FIXED ADMIN LOGIN */
function loginAdmin(){

const pass = document.getElementById("adminPass").value.trim();

if(pass === "1234"){
document.getElementById("adminBox").style.display = "block";
loadOrders();
alert("Login successful 🚀");
}else{
alert("Wrong password");
}
}

</script>

</body>
</html>
