<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhockstar Nation SaaS Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#0b0b0b;color:#fff;}

.nav{
display:flex;justify-content:center;gap:10px;
padding:10px;background:#111;position:sticky;top:0;
}

.nav button{
background:#222;color:#fff;border:none;
padding:10px 14px;border-radius:8px;
}

.page{display:none;padding:20px;}
.active{display:block;}

.container{max-width:1000px;margin:auto;}

.card{
background:#151515;padding:15px;border-radius:10px;margin:10px 0;
}

input,select,textarea{
width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;
}

.btn{
width:100%;padding:10px;margin-top:10px;
background:#00ffcc;border:none;border-radius:8px;
}

.status{
padding:5px 10px;border-radius:6px;font-size:12px;
}
.pending{background:orange;color:#000;}
.progress{background:blue;}
.done{background:green;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="go('home')">Home</button>
<button onclick="go('services')">Services</button>
<button onclick="go('orders')">Orders</button>
<button onclick="go('admin')">Admin</button>
<button onclick="go('login')">Login</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="container">
<div class="card">
<h2>Rhockstar Nation SaaS 🚀</h2>
<p>Production-ready business system</p>
</div>
</div>
</div>

<!-- SERVICES -->
<div id="services" class="page">
<div class="container">

<div class="card"><h3>Advert Placement</h3><p>₦5k - ₦100k</p></div>
<div class="card"><h3>Certificate Editing</h3><p>₦40,000</p></div>
<div class="card"><h3>Document Editing</h3><p>₦30,000</p></div>
<div class="card"><h3>Graphics Design</h3><p>₦15,000</p></div>
<div class="card"><h3>Logo Design</h3><p>₦10,000</p></div>
<div class="card"><h3>Web Design</h3><p>₦120k - ₦500k+</p></div>

</div>
</div>

<!-- ORDER -->
<div id="orders" class="page">
<div class="container">

<div class="card">
<h3>Create Order</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<select id="service">
<option>Advert</option>
<option>Certificate Editing</option>
<option>Document Editing</option>
<option>Graphics Design</option>
<option>Logo Design</option>
<option>Web Design</option>
</select>

<textarea id="desc" placeholder="Details"></textarea>

<button class="btn" onclick="createOrder()">Submit Secure Order</button>
</div>

</div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<div class="container">
<div class="card">
<h3>Admin Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>
</div>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<div class="container">

<div class="card">
<h3>Admin Dashboard</h3>
<p id="status">Checking authentication...</p>
</div>

<div id="ordersList"></div>

</div>
</div>

<script>

const firebaseConfig = {
apiKey:"AIzaSyApIqqO8AfmyA3N6JofFGxEjfcxKo6nXXc",
authDomain:"rhockstar-admin.firebaseapp.com",
projectId:"rhockstar-admin",
storageBucket:"rhockstar-admin.firebasestorage.app",
messagingSenderId:"66440765531",
appId:"1:66440765531:web:9b0d3fd8b110defac29f7e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* NAV */
function go(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');
}

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>go('admin'))
.catch(e=>alert(e.message));
}

/* CREATE ORDER (SECURE STRUCTURE) */
function createOrder(){
db.collection("orders").add({
name:name.value,
phone:phone.value,
service:service.value,
desc:desc.value,
status:"Pending",
payment:"Half",
createdAt:new Date(),
createdBy:auth.currentUser ? auth.currentUser.email : "guest"
});

alert("Order created ✔");
go("home");
}

/* LOAD ORDERS */
function loadOrders(){
db.collection("orders").onSnapshot(snap=>{
ordersList.innerHTML="";

snap.forEach(doc=>{
let o=doc.data();

ordersList.innerHTML+=`
<div class="card">
<h4>${o.name}</h4>
<p>${o.service}</p>
<p>${o.desc}</p>

<span class="status ${o.status.toLowerCase()}">${o.status}</span>

<button class="btn" onclick="update('${doc.id}','In Progress')">Start</button>
<button class="btn" onclick="update('${doc.id}','Completed')">Complete</button>
</div>
`;
});
});
}

function update(id,status){
db.collection("orders").doc(id).update({status});
}

/* AUTH GUARD (PRODUCTION SECURITY STYLE) */
auth.onAuthStateChanged(user=>{
if(user){
status.innerText="Authenticated ✔ " + user.email;
loadOrders();
}else{
status.innerText="Not authenticated ❌";
}
});

</script>

</body>
</html>
