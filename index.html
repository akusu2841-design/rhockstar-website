<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhockstar Nation SaaS Pro</title>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

/* BACKGROUND ANIMATION */
body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(-45deg,#0b0b0b,#111,#1a1a1a,#0b0b0b);
background-size:400% 400%;
animation:moveBG 12s ease infinite;
overflow-x:hidden;
}

@keyframes moveBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* NAV */
nav{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
padding:10px;
border-radius:40px;
display:flex;
gap:10px;
z-index:999;
}

nav button{
padding:10px 15px;
border:none;
border-radius:20px;
background:#222;
color:#fff;
cursor:pointer;
}

nav button:hover{
background:#00ffcc;
color:#000;
}

/* PAGES */
.page{display:none;padding:20px;min-height:100vh}
.active{display:block}

/* CARDS */
.card{
background:rgba(255,255,255,0.08);
padding:15px;
margin:10px 0;
border-radius:12px;
backdrop-filter:blur(10px);
}

/* INPUTS */
input,textarea,select{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#222;
color:#fff;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:10px;
background:#00ffcc;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{opacity:0.8}

/* WHATSAPP FLOAT */
.wa{
position:fixed;
bottom:90px;
right:20px;
background:#25D366;
color:#fff;
padding:15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
z-index:9999;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('services')">Services</button>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('admin')">Admin</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<h1>Rhockstar Nation SaaS</h1>

<div class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>
</div>

<!-- SERVICES -->
<div id="services" class="page">

<h2>Services</h2>

<!-- ADVERT (UPDATED PRICES) -->
<div class="card">
<h3>📢 Advert Placement</h3>

<p>
24 Hours — ₦5,000<br>
3 Days — ₦12,000<br>
1 Week — ₦25,000<br>
1 Month — ₦90,000
</p>

<button onclick="selectService('Advert - 24 Hours',5000)">24 Hours</button>
<button onclick="selectService('Advert - 3 Days',12000)">3 Days</button>
<button onclick="selectService('Advert - 1 Week',25000)">1 Week</button>
<button onclick="selectService('Advert - 1 Month',90000)">1 Month</button>
</div>

<div class="card" onclick="selectService('Graphics Design',15000)">Graphics Design ₦15,000</div>
<div class="card" onclick="selectService('Logo Design',10000)">Logo Design ₦10,000</div>
<div class="card" onclick="selectService('Web Design',120000)">Web Design ₦120,000</div>
<div class="card" onclick="selectService('Web Development',200000)">Web Development ₦200,000</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">

<h2>User Dashboard</h2>

<div class="card">

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<input id="serviceInput" placeholder="Service" readonly>
<input id="priceInput" placeholder="Price" readonly>

<textarea id="desc" placeholder="Project details"></textarea>

<button onclick="pay()">Pay & Create Order</button>

</div>

<div class="card">
<h3>My Orders</h3>
<div id="myOrders"></div>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="page">

<h2>Admin Panel</h2>
<div id="allOrders"></div>

</div>

<!-- WHATSAPP -->
<a class="wa" href="https://wa.me/2348074647269" target="_blank">
💬 WhatsApp
</a>

<script>

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCKdJaHy_FUSFbnUkTCm3p7p32sM1E5r7w",
authDomain: "rhockstar-nation.firebaseapp.com",
projectId: "rhockstar-nation",
storageBucket: "rhockstar-nation.appspot.com",
messagingSenderId: "707658422879",
appId: "1:707658422879:web:aad99a01a882bb21a999ea"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let selectedPrice = 0;

/* NAV */
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* AUTH */
function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>alert("Registered"))
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>alert("Logged in"))
.catch(e=>alert(e.message));
}

/* SELECT SERVICE */
function selectService(service,price){
serviceInput.value = service;
priceInput.value = price;
selectedPrice = price;
show('dashboard');
}

/* PAYSTACK */
function pay(){

if(!auth.currentUser){
alert("Login first");
return;
}

let handler = PaystackPop.setup({
key:"pk_test_f9c8ed728fac1059de000e81d0a57ce44e59d8d0",
email:auth.currentUser.email,
amount:selectedPrice*100,
currency:"NGN",

callback:function(res){

db.collection("orders").add({
userId:auth.currentUser.uid,
name:name.value,
phone:phone.value,
service:serviceInput.value,
price:selectedPrice,
desc:desc.value,
status:"Pending",
reference:res.reference,
time:new Date()
});

loadMyOrders();
loadAllOrders();
alert("Order successful 🚀");

}
});

handler.openIframe();
}

/* MY ORDERS */
function loadMyOrders(){

if(!auth.currentUser) return;

db.collection("orders")
.where("userId","==",auth.currentUser.uid)
.onSnapshot(snap=>{

myOrders.innerHTML="";

snap.forEach(d=>{
let o=d.data();

myOrders.innerHTML+=`
<div class="card">
<b>${o.service}</b><br>
₦${o.price}<br>
Status: ${o.status}
</div>`;
});
});
}

/* ADMIN */
function loadAllOrders(){

db.collection("orders")
.onSnapshot(snap=>{

allOrders.innerHTML="";

snap.forEach(d=>{
let o=d.data();

allOrders.innerHTML+=`
<div class="card">
<b>${o.name}</b><br>
${o.service}<br>
₦${o.price}<br>
Status: ${o.status}<br>

<button onclick="updateStatus('${d.id}','In Progress')">Start</button>
<button onclick="updateStatus('${d.id}','Completed')">Complete</button>

</div>`;
});
});
}

function updateStatus(id,status){
db.collection("orders").doc(id).update({
status:status
});
}

/* INIT */
auth.onAuthStateChanged(user=>{
if(user){
loadMyOrders();
loadAllOrders();
}
});

</script>

</body>
</html>
