<!DOCTYPE html>
<html>
<head>
  <title>Rhockstar Nation</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    /* NAV */
    .nav {
      background: #111;
      padding: 12px;
      display: flex;
      gap: 10px;
      justify-content: center;
      position: sticky;
      top: 0;
    }

    .nav button {
      background: #222;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
    }

    .nav button:hover {
      background: #00ffcc;
      color: black;
    }

    /* PAGE SYSTEM */
    .page {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .active {
      display: flex;
    }

    /* CARD */
    .card {
      background: #1a1a1a;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    .btn {
      background: #00ffcc;
      border: none;
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      cursor: pointer;
      border-radius: 8px;
    }

    .btn:hover {
      background: #00c9a7;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('orders')">Orders</button>
  <button onclick="openPage('admin')">Admin</button>
  <button onclick="openPage('login')">Login</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h2>Welcome to Rhockstar Nation 🚀</h2>
  </div>
</div>

<!-- ORDERS -->
<div id="orders" class="page">
  <div class="card">
    <h2>Place Order</h2>

    <form id="orderForm">
      <input id="name" placeholder="Name" required>
      <input id="phone" placeholder="Phone" required>

      <select id="service">
        <option value="Graphic Design|15000">Graphic Design</option>
        <option value="Video Editing|60000">Video Editing</option>
        <option value="Document Design|30000">Document Design</option>
      </select>

      <textarea id="desc" placeholder="Description"></textarea>

      <button class="btn" type="submit">Submit Order</button>
    </form>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <div class="card">
    <h2>Admin Panel</h2>
    <p id="adminStatus">Checking login...</p>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <div class="card">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<script>
  // Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyApIqqO8AfmyA3N6JofFGxEjfcxKo6nXXc",
    authDomain: "rhockstar-admin.firebaseapp.com",
    projectId: "rhockstar-admin",
    storageBucket: "rhockstar-admin.firebasestorage.app",
    messagingSenderId: "66440765531",
    appId: "1:66440765531:web:9b0d3fd8b110defac29f7e"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  // PAGE NAVIGATION (FEELS LIKE REAL PAGE)
  function openPage(pageId) {
    document.querySelectorAll(".page").forEach(p => {
      p.classList.remove("active");
    });

    document.getElementById(pageId).classList.add("active");
  }

  // LOGIN
  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        openPage("admin");
      })
      .catch(err => alert(err.message));
  }

  // PROTECT ADMIN PAGE
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("adminStatus").innerText = "Logged in as Admin ✅";
    } else {
      document.getElementById("adminStatus").innerText = "Not logged in ❌";
    }
  });

  // ORDER
  document.getElementById("orderForm").addEventListener("submit", e => {
    e.preventDefault();

    db.collection("orders").add({
      name: name.value,
      phone: phone.value,
      service: service.value,
      description: desc.value,
      time: new Date()
    });

    alert("Order submitted 🚀");
    document.getElementById("orderForm").reset();
  });
</script>

</body>
</html>
