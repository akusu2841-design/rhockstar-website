<!DOCTYPE html>
<html>
<head>
  <title>Rhockstar Nation</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    /* Navigation bar */
    .nav {
      background: #111;
      padding: 10px;
    }

    .nav button {
      color: white;
      background: #333;
      border: none;
      padding: 10px 15px;
      margin-right: 5px;
      cursor: pointer;
    }

    .nav button:hover {
      background: #555;
    }

    /* Pages */
    .page {
      display: none;
      padding: 20px;
    }

    /* Home shows first */
    #home {
      display: block;
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<div class="nav">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('orders')">Orders</button>
  <button onclick="showPage('admin')">Admin</button>
</div>

<!-- HOME PAGE -->
<div id="home" class="page">
  <h1>Welcome to Rhockstar Nation</h1>
  <p>Your entertainment and business hub.</p>
</div>

<!-- ORDERS PAGE -->
<div id="orders" class="page">
  <h1>Orders</h1>
  <p>No orders yet (we will connect Firebase here later).</p>
</div>

<!-- ADMIN PAGE -->
<div id="admin" class="page">
  <h1>Admin Panel</h1>
  <p>Manage your system here.</p>
</div>

<!-- JAVASCRIPT (page switcher) -->
<script>
function showPage(pageId) {
  let pages = document.querySelectorAll(".page");

  pages.forEach(page => {
    page.style.display = "none";
  });

  document.getElementById(pageId).style.display = "block";
}
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<title>Rhockstar Login</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body {
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:#1a1a1a;
    padding:25px;
    border-radius:10px;
    width:300px;
}

input {
    width:100%;
    padding:10px;
    margin:8px 0;
}

button {
    width:100%;
    padding:10px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyApIqqO8AfmyA3N6JofFGxEjfcxKo6nXXc",
  authDomain: "rhockstar-admin.firebaseapp.com",
  projectId: "rhockstar-admin",
  storageBucket: "rhockstar-admin.firebasestorage.app",
  messagingSenderId: "66440765531",
  appId: "1:66440765531:web:9b0d3fd8b110defac29f7e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
        alert("Login successful 🚀");
        window.location.href = "admin.html";
    })
    .catch((error) => {
        alert("Login failed: " + error.message);
    });
}

</script>

</body>
</html>
