<!DOCTYPE html>
<html>
<head>
<title>Rhockstar Login</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body {
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:#1a1a1a;
    padding:25px;
    border-radius:10px;
    width:300px;
}

input {
    width:100%;
    padding:10px;
    margin:8px 0;
}

button {
    width:100%;
    padding:10px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyApIqqO8AfmyA3N6JofFGxEjfcxKo6nXXc",
  authDomain: "rhockstar-admin.firebaseapp.com",
  projectId: "rhockstar-admin",
  storageBucket: "rhockstar-admin.firebasestorage.app",
  messagingSenderId: "66440765531",
  appId: "1:66440765531:web:9b0d3fd8b110defac29f7e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
        alert("Login successful 🚀");
        window.location.href = "admin.html";
    })
    .catch((error) => {
        alert("Login failed: " + error.message);
    });
}

</script>

</body>
</html>
